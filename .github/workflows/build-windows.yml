name: Build Windows app

# Produces the double-clickable Windows SlideCheck.exe without needing a Windows
# machine. Run it manually from the Actions tab (workflow_dispatch), or it runs
# automatically when you push a version tag like v0.2.0.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run the test suite
        run: uv run pytest -q

      - name: Build the .exe
        run: uv run pyinstaller packaging/slidecheck.spec

      - name: Upload the app as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlideCheck-windows
          path: dist/SlideCheck/
          if-no-files-found: error
